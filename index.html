<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KIS AI Trader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e5e7eb;font-family:'JetBrains Mono','Fira Code',monospace}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111827}::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:2px}
input,select{font-family:'JetBrains Mono',monospace}
.blink{animation:blink 1.2s step-end infinite}
@keyframes blink{50%{opacity:0}}
.fade{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.glow{animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const T={bg:"#0a0e1a",panel:"#111827",panel2:"#0f1623",border:"#1e2d45",accent:"#f59e0b",red:"#ef4444",green:"#22c55e",muted:"#6b7280",text:"#e5e7eb",sub:"#9ca3af"};
const KIS_REAL="https://openapi.koreainvestment.com:9443";
const KIS_VTS ="https://openapivts.koreainvestment.com:29443";
const TR={real:{order_buy:"TTTC0802U",order_sell:"TTTC0801U",balance:"TTTC8434R",price:"FHKST01010100",chart:"FHKST01010400"},virtual:{order_buy:"VTTC0802U",order_sell:"VTTC0801U",balance:"VTTC8434R",price:"FHKST01010100",chart:"FHKST01010400"}};

async function getToken(appKey,appSecret,mode){
  const base=mode==="real"?KIS_REAL:KIS_VTS;
  const res=await fetch(`${base}/oauth2/tokenP`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({grant_type:"client_credentials",appkey:appKey,appsecret:appSecret})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error_description||`토큰 발급 실패 (${res.status})`);}
  const d=await res.json();return d.access_token;
}
async function kisGET(path,query,cred,mode){
  const base=mode==="real"?KIS_REAL:KIS_VTS;
  const url=new URL(base+path);
  const{tr_id,...rest}=query;
  Object.entries(rest).forEach(([k,v])=>url.searchParams.set(k,v));
  const res=await fetch(url.toString(),{headers:{authorization:`Bearer ${cred.accessToken}`,appkey:cred.appKey,appsecret:cred.appSecret,tr_id,"Content-Type":"application/json; charset=utf-8"}});
  const d=await res.json();
  if(d.rt_cd&&d.rt_cd!=="0")throw new Error(d.msg1||`API 오류 ${d.rt_cd}`);
  return d;
}
async function kisPOST(path,body,tr_id,cred,mode){
  const base=mode==="real"?KIS_REAL:KIS_VTS;
  const res=await fetch(base+path,{method:"POST",headers:{authorization:`Bearer ${cred.accessToken}`,appkey:cred.appKey,appsecret:cred.appSecret,tr_id,"Content-Type":"application/json; charset=utf-8"},body:JSON.stringify(body)});
  const d=await res.json();
  if(d.rt_cd&&d.rt_cd!=="0")throw new Error(d.msg1||`주문 오류 ${d.rt_cd}`);
  return d;
}
async function getStockPrice(ticker,cred,mode){
  const d=await kisGET("/uapi/domestic-stock/v1/quotations/inquire-price",{tr_id:TR[mode].price,FID_COND_MRKT_DIV_CODE:"J",FID_INPUT_ISCD:ticker},cred,mode);
  return d.output;
}
async function getDailyChart(ticker,cred,mode){
  const today=new Date(),end=today.toISOString().slice(0,10).replace(/-/g,""),start=new Date(today-40*86400000).toISOString().slice(0,10).replace(/-/g,"");
  const d=await kisGET("/uapi/domestic-stock/v1/quotations/inquire-daily-price",{tr_id:TR[mode].chart,FID_COND_MRKT_DIV_CODE:"J",FID_INPUT_ISCD:ticker,FID_PERIOD_DIV_CODE:"D",FID_ORD_DIVI:"D",FID_INPUT_DATE_1:start,FID_INPUT_DATE_2:end},cred,mode);
  return(d.output2||[]).slice(0,30).reverse();
}
async function getBalance(cred,mode){
  return kisGET("/uapi/domestic-stock/v1/trading/inquire-balance",{tr_id:TR[mode].balance,CANO:cred.accountNo.slice(0,8),ACNT_PRDT_CD:cred.accountNo.slice(8)||"01",AFHR_FLPR_YN:"N",OFL_YN:"",INQR_DVSN:"02",UNPR_DVSN:"01",FUND_STTL_ICLD_YN:"N",FNCG_AMT_AUTO_RDPT_YN:"N",PRCS_DVSN:"01",CTX_AREA_FK100:"",CTX_AREA_NK100:""},cred,mode);
}
async function placeOrder(ticker,qty,price,side,cred,mode){
  const tr_id=side==="buy"?TR[mode].order_buy:TR[mode].order_sell;
  return kisPOST("/uapi/domestic-stock/v1/trading/order-cash",{CANO:cred.accountNo.slice(0,8),ACNT_PRDT_CD:cred.accountNo.slice(8)||"01",PDNO:ticker,ORD_DVSN:price===0?"01":"00",ORD_QTY:String(qty),ORD_UNPR:price===0?"0":String(price)},tr_id,cred,mode);
}
function calcSMA(c,n){if(c.length<n)return null;return c.slice(-n).reduce((a,b)=>a+b,0)/n;}
function calcRSI(c,n=14){if(c.length<n+1)return null;const ch=c.slice(1).map((v,i)=>v-c[i]);const ag=ch.slice(-n).filter(x=>x>0).reduce((a,b)=>a+b,0)/n;const al=ch.slice(-n).filter(x=>x<0).map(x=>-x).reduce((a,b)=>a+b,0)/n;return al===0?100:100-100/(1+ag/al);}
function calcMACD(c){if(c.length<26)return null;const ema=(arr,p)=>{const k=2/(p+1);return arr.reduce((p,x,i)=>i===0?x:p*(1-k)+x*k,arr[0]);};const macd=ema(c.slice(-12),12)-ema(c.slice(-26),26);return{macd,signal:macd*0.9};}
function computeIndicators(candles){const cl=candles.map(c=>parseFloat(c.stck_clpr)),vo=candles.map(c=>parseFloat(c.acml_vol));return{close:cl.at(-1),sma5:calcSMA(cl,5),sma20:calcSMA(cl,20),rsi:calcRSI(cl),macd:calcMACD(cl),avgVol:vo.slice(-5).reduce((a,b)=>a+b,0)/5,todayVol:vo.at(-1),chg:cl.length>=2?((cl.at(-1)-cl.at(-2))/cl.at(-2)*100).toFixed(2):0};}
async function analyzeWithClaude(stockInfo,ind,news){
  const prompt=`당신은 한국 주식시장 전문 AI 트레이딩 시스템입니다. 다음 데이터를 종합하여 JSON만 출력하세요. 다른 텍스트 없이 JSON만 출력하세요.
종목: ${stockInfo.hts_kor_isnm} 현재가: ${parseInt(stockInfo.stck_prpr).toLocaleString()}원 등락률: ${stockInfo.prdy_ctrt}%
RSI(14): ${ind.rsi?.toFixed(1)??"N/A"} ${ind.rsi>70?"(과매수)":ind.rsi<30?"(과매도)":"(중립)"}
5일선: ${ind.sma5?.toFixed(0)??"N/A"}원 20일선: ${ind.sma20?.toFixed(0)??"N/A"}원
거래량/5일평균: ${ind.avgVol?(ind.todayVol/ind.avgVol*100).toFixed(0):"N/A"}%
뉴스/공시: ${news||"없음"}
JSON형식: {"action":"매수"|"매도"|"관망","confidence":0~100,"targetPrice":숫자,"stopLoss":숫자,"suggestedQty":1~10,"orderType":"시장가"|"지정가","reasoning":{"technical":"기술 근거","sentiment":"뉴스 분석","risk":"리스크"},"keyPoints":["포인트1","포인트2","포인트3"]}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  const text=(data.content||[]).map(b=>b.text||"").join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function RSIBar({value}){
  if(value==null)return React.createElement("span",{style:{color:T.muted}},"N/A");
  const color=value>70?T.red:value<30?T.green:T.accent;
  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
    React.createElement("div",{style:{flex:1,height:5,background:T.border,borderRadius:3,overflow:"hidden"}},
      React.createElement("div",{style:{width:`${value}%`,height:"100%",background:color,borderRadius:3,transition:"width .6s"}})),
    React.createElement("span",{style:{color,minWidth:32,fontSize:12,textAlign:"right"}},value.toFixed(1)));
}
function Gauge({value,action}){
  const color=action==="매수"?T.green:action==="매도"?T.red:T.accent;
  const C=2*Math.PI*34,offset=C-(value/100)*C;
  return React.createElement("div",{style:{position:"relative",width:84,height:84}},
    React.createElement("svg",{width:"84",height:"84",style:{transform:"rotate(-90deg)"}},
      React.createElement("circle",{cx:"42",cy:"42",r:"34",fill:"none",stroke:T.border,strokeWidth:"6"}),
      React.createElement("circle",{cx:"42",cy:"42",r:"34",fill:"none",stroke:color,strokeWidth:"6",strokeDasharray:C,strokeDashoffset:offset,style:{transition:"stroke-dashoffset 1s ease"}})),
    React.createElement("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
      React.createElement("span",{style:{fontSize:18,fontWeight:700,color}},`${value}%`),
      React.createElement("span",{style:{fontSize:9,color:T.muted}},"신뢰도")));
}
function Spark({candles}){
  if(!candles?.length)return null;
  const cl=candles.map(c=>parseFloat(c.stck_clpr)),mn=Math.min(...cl),mx=Math.max(...cl),rng=mx-mn||1;
  const W=200,H=44,P=3;
  const pts=cl.map((v,i)=>`${P+(i/(cl.length-1))*(W-2*P)},${H-P-((v-mn)/rng)*(H-2*P)}`).join(" ");
  return React.createElement("svg",{width:W,height:H,style:{display:"block"}},
    React.createElement("polyline",{points:pts,fill:"none",stroke:cl.at(-1)>=cl.at(-2)?T.green:T.red,strokeWidth:"1.5"}));
}

function App(){
  const[screen,setScreen]=React.useState("login");
  const[mode,setMode]=React.useState("virtual");
  const[cred,setCred]=React.useState({appKey:"",appSecret:"",accessToken:"",accountNo:""});
  const[tokenBusy,setTokenBusy]=React.useState(false);
  const[tokenErr,setTokenErr]=React.useState("");
  const[ticker,setTicker]=React.useState("005930");
  const[news,setNews]=React.useState("");
  const[busy,setBusy]=React.useState(false);
  const[err,setErr]=React.useState("");
  const[stockInfo,setStockInfo]=React.useState(null);
  const[candles,setCandles]=React.useState([]);
  const[indicators,setIndicators]=React.useState(null);
  const[aiResult,setAiResult]=React.useState(null);
  const[balance,setBalance]=React.useState(null);
  const[orderQty,setOrderQty]=React.useState(1);
  const[orderPrice,setOrderPrice]=React.useState(0);
  const[orderType,setOrderType]=React.useState("시장가");
  const[orderBusy,setOrderBusy]=React.useState(false);
  const[orderMsg,setOrderMsg]=React.useState(null);
  const[confirmOpen,setConfirmOpen]=React.useState(null);
  const[log,setLog]=React.useState([]);
  const logRef=React.useRef(null);
  const addLog=React.useCallback((msg,type="info")=>{const t=new Date().toLocaleTimeString("ko-KR");setLog(p=>[...p.slice(-60),{t,msg,type}]);},[]);
  React.useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[log]);

  const handleConnect=async()=>{
    setTokenBusy(true);setTokenErr("");
    try{const token=await getToken(cred.appKey,cred.appSecret,mode);setCred(p=>({...p,accessToken:token}));addLog(`[${mode==="real"?"실전":"모의"}] 토큰 발급 성공`,"success");setScreen("main");}
    catch(e){setTokenErr(e.message);}
    finally{setTokenBusy(false);}
  };
  const handleAnalyze=async()=>{
    if(!ticker.trim())return;
    setBusy(true);setErr("");setAiResult(null);setOrderMsg(null);
    try{
      addLog(`[${ticker}] 현재가 조회...`);
      const price=await getStockPrice(ticker,cred,mode);setStockInfo(price);
      addLog(`${price.hts_kor_isnm} ${parseInt(price.stck_prpr).toLocaleString()}원 (${price.prdy_ctrt}%)`,"success");
      addLog("일봉 차트 수집...");
      const chart=await getDailyChart(ticker,cred,mode);setCandles(chart);
      const ind=computeIndicators(chart);setIndicators(ind);
      addLog(`RSI:${ind.rsi?.toFixed(1)} SMA20:${ind.sma20?.toFixed(0)}`);
      addLog("잔고 조회...");
      try{const bal=await getBalance(cred,mode);setBalance(bal);addLog("잔고 조회 완료","success");}catch(e){addLog(`잔고 조회 실패: ${e.message}`,"warn");}
      addLog("Claude AI 분석 중... ⏳");
      const ai=await analyzeWithClaude(price,ind,news);setAiResult(ai);
      setOrderQty(ai.suggestedQty||1);setOrderType(ai.orderType||"시장가");
      setOrderPrice(ai.orderType==="지정가"?(ai.action==="매수"?ai.targetPrice:ai.stopLoss):0);
      addLog(`AI판단: ${ai.action} (신뢰도 ${ai.confidence}%)`,ai.action==="매수"?"success":ai.action==="매도"?"error":"warn");
    }catch(e){setErr(e.message);addLog(`오류: ${e.message}`,"error");}
    finally{setBusy(false);}
  };
  const handleOrder=async(side)=>{
    setConfirmOpen(null);setOrderBusy(true);setOrderMsg(null);
    const price=orderType==="시장가"?0:orderPrice;
    try{
      addLog(`${side==="buy"?"매수":"매도"} 주문: ${ticker} ${orderQty}주 ${orderType}`,"warn");
      const d=await placeOrder(ticker,orderQty,price,side,cred,mode);
      const msg=`주문번호 ${d.output?.ODNO||"발급"}`;
      setOrderMsg({ok:true,text:`${side==="buy"?"매수":"매도"} 완료! ${msg}`});
      addLog(`주문 성공: ${msg}`,"success");
    }catch(e){setOrderMsg({ok:false,text:e.message});addLog(`주문 실패: ${e.message}`,"error");}
    finally{setOrderBusy(false);}
  };

  const acColor=aiResult?.action==="매수"?T.green:aiResult?.action==="매도"?T.red:T.accent;
  const modeColor=mode==="real"?T.red:T.green;
  const cash=balance?.output2?.[0]?.dnca_tot_amt;
  const s=(obj)=>({...obj});

  if(screen==="login") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg,padding:20}}>
      <div style={{width:"100%",maxWidth:440,background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,padding:32}}>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:11,color:T.accent,letterSpacing:3,marginBottom:8}}>KIS DEVELOPERS</div>
          <h1 style={{fontSize:22,fontWeight:700}}>AI 자동매매 시스템</h1>
          <p style={{fontSize:12,color:T.muted,marginTop:5}}>한국투자증권 OpenAPI + Claude AI</p>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:20,background:T.bg,borderRadius:8,padding:4}}>
          {["virtual","real"].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,border:"none",borderRadius:6,padding:"9px 0",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:mode===m?(m==="real"?T.red:T.green):"transparent",color:mode===m?"#000":T.muted,transition:"all .2s"}}>
              {m==="real"?"🔴 실전투자":"🟢 모의투자"}
            </button>
          ))}
        </div>
        {mode==="real"&&<div style={{background:"#1f0a0a",border:`1px solid ${T.red}50`,borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:11,color:T.red,lineHeight:1.7}}>⚠️ <b>실전투자 모드</b>입니다. 실제 자금이 사용됩니다.</div>}
        {[{label:"App Key",key:"appKey",ph:"KIS App Key"},{label:"App Secret",key:"appSecret",ph:"KIS App Secret"},{label:"계좌번호",key:"accountNo",ph:"계좌번호 (숫자만)"}].map(f=>(
          <div key={f.key} style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,color:T.muted,marginBottom:5,letterSpacing:1}}>{f.label}</label>
            <input type="password" value={cred[f.key]} onChange={e=>setCred(p=>({...p,[f.key]:e.target.value.replace(/\s/g,"")}))} placeholder={f.ph}
              style={{width:"100%",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:"10px 12px",color:T.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
        ))}
        {tokenErr&&<div style={{background:"#1f0a0a",border:`1px solid ${T.red}40`,borderRadius:6,padding:"10px 12px",color:T.red,fontSize:12,marginBottom:14}}>{tokenErr}</div>}
        <button onClick={handleConnect} disabled={tokenBusy||!cred.appKey||!cred.appSecret||!cred.accountNo} className={!tokenBusy?"glow":""}
          style={{width:"100%",background:mode==="real"?T.red:T.accent,color:"#000",border:"none",borderRadius:8,padding:"13px 0",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:(tokenBusy||!cred.appKey||!cred.appSecret||!cred.accountNo)?0.4:1,marginBottom:14}}>
          {tokenBusy?"토큰 발급 중...":`${mode==="real"?"실전":"모의"} 투자 시작`}
        </button>
        <div style={{padding:"12px 14px",background:T.panel2,borderRadius:8,border:`1px solid ${T.border}`,fontSize:11,color:T.muted,lineHeight:1.7}}>
          🔒 입력된 키는 브라우저 메모리에만 저장됩니다.
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:T.bg,padding:16,maxWidth:940,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,paddingBottom:10,borderBottom:`1px solid ${T.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <span style={{fontSize:12,color:T.accent,letterSpacing:2,fontWeight:700}}>KIS AI TRADER</span>
          <span style={{fontSize:11,background:`${modeColor}20`,border:`1px solid ${modeColor}50`,color:modeColor,borderRadius:20,padding:"2px 10px"}}>{mode==="real"?"🔴 실전":"🟢 모의"}</span>
          <span style={{fontSize:11,color:T.green}}><span className="blink">●</span> ONLINE</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setMode(m=>m==="real"?"virtual":"real");setScreen("login");}} style={{background:"none",border:`1px solid ${T.border}`,color:T.muted,borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{mode==="real"?"모의전환":"실전전환"}</button>
          <button onClick={()=>setScreen("login")} style={{background:"none",border:`1px solid ${T.border}`,color:T.muted,borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>재연결</button>
        </div>
      </div>

      {cash&&<div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 18px",marginBottom:14,display:"flex",gap:24,flexWrap:"wrap"}}>
        <div><div style={{fontSize:10,color:T.muted,marginBottom:3}}>예수금</div><div style={{fontSize:16,fontWeight:700,color:T.accent}}>{parseInt(cash).toLocaleString()}원</div></div>
        {(balance?.output1||[]).slice(0,4).map((h,i)=>(
          <div key={i}><div style={{fontSize:10,color:T.muted,marginBottom:3}}>{h.prdt_name}</div>
          <div style={{fontSize:13,fontWeight:600,color:parseFloat(h.evlu_pfls_rt)>=0?T.green:T.red}}>{parseInt(h.hldg_qty)}주 {parseFloat(h.evlu_pfls_rt)>=0?"▲":"▼"}{Math.abs(parseFloat(h.evlu_pfls_rt)).toFixed(2)}%</div></div>
        ))}
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"130px 1fr",gap:10,marginBottom:12}}>
        <div>
          <label style={{display:"block",fontSize:11,color:T.muted,marginBottom:5,letterSpacing:1}}>종목코드</label>
          <input value={ticker} onChange={e=>setTicker(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="005930"
            style={{width:"100%",background:T.panel,border:`1px solid ${T.border}`,borderRadius:6,padding:"10px 12px",color:T.text,fontSize:18,fontWeight:700,fontFamily:"inherit",outline:"none",letterSpacing:3}}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:T.muted,marginBottom:5,letterSpacing:1}}>뉴스 / 공시 (선택)</label>
          <input value={news} onChange={e=>setNews(e.target.value)} placeholder="최근 뉴스나 공시를 붙여넣으면 AI가 종합 분석합니다..."
            style={{width:"100%",background:T.panel,border:`1px solid ${T.border}`,borderRadius:6,padding:"10px 12px",color:T.text,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
        </div>
      </div>

      <button onClick={handleAnalyze} disabled={busy} style={{width:"100%",background:busy?T.border:T.accent,color:busy?T.muted:"#000",border:"none",borderRadius:8,padding:"13px 0",fontSize:14,fontWeight:700,cursor:busy?"not-allowed":"pointer",fontFamily:"inherit",marginBottom:16,transition:"all .2s"}}>
        {busy?"⏳ 분석 중...":"🔍 AI 종합 분석 실행"}
      </button>

      {err&&<div style={{background:"#1f0a0a",border:`1px solid ${T.red}40`,borderRadius:8,padding:"12px 16px",color:T.red,fontSize:13,marginBottom:14}}>{err}</div>}

      {stockInfo&&<div className="fade" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:18}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:8}}>{stockInfo.hts_kor_isnm}</div>
          <div style={{fontSize:28,fontWeight:700,marginBottom:4}}>{parseInt(stockInfo.stck_prpr).toLocaleString()}<span style={{fontSize:14,color:T.muted}}>원</span></div>
          <div style={{fontSize:14,color:parseFloat(stockInfo.prdy_ctrt)>=0?T.green:T.red,marginBottom:12}}>{parseFloat(stockInfo.prdy_ctrt)>=0?"▲":"▼"} {Math.abs(stockInfo.prdy_ctrt)}%</div>
          <Spark candles={candles}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
            {[["거래량",parseInt(stockInfo.acml_vol).toLocaleString()],["시가총액",`${stockInfo.hts_avls}억`],["52주고가",parseInt(stockInfo.d250_hgpr).toLocaleString()],["52주저가",parseInt(stockInfo.d250_lwpr).toLocaleString()]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,color:T.muted}}>{l}</div><div style={{fontSize:12,fontWeight:600}}>{v}</div></div>
            ))}
          </div>
        </div>
        <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:18}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:14}}>기술적 지표</div>
          {indicators&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.muted,marginBottom:4}}>
                <span>RSI (14)</span><span style={{color:indicators.rsi>70?T.red:indicators.rsi<30?T.green:T.sub}}>{indicators.rsi>70?"과매수":indicators.rsi<30?"과매도":"중립"}</span>
              </div>
              <RSIBar value={indicators.rsi}/>
            </div>
            {[["5일선",indicators.sma5],["20일선",indicators.sma20]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:T.muted}}>{l}</span>
                <div><span style={{fontSize:12}}>{v?.toLocaleString()??"N/A"}</span>{v&&<span style={{fontSize:10,color:indicators.close>v?T.green:T.red,marginLeft:6}}>{indicators.close>v?"↑위":"↓아래"}</span>}</div>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:T.muted}}>거래량 비율</span>
              <span style={{fontSize:12,color:indicators.todayVol>indicators.avgVol?T.green:T.sub}}>{indicators.avgVol?(indicators.todayVol/indicators.avgVol*100).toFixed(0):"N/A"}%</span>
            </div>
          </div>}
        </div>
      </div>}

      {aiResult&&<div className="fade" style={{background:T.panel,border:`2px solid ${acColor}40`,borderRadius:10,padding:20,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
          <div><div style={{fontSize:11,color:T.muted,marginBottom:5}}>AI 매매 판단</div><div style={{fontSize:36,fontWeight:700,color:acColor}}>{aiResult.action}</div></div>
          <Gauge value={aiResult.confidence} action={aiResult.action}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div style={{background:`${T.green}15`,border:`1px solid ${T.green}30`,borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:T.muted,marginBottom:3}}>목표가</div>
            <div style={{fontSize:17,fontWeight:700,color:T.green}}>{aiResult.targetPrice?.toLocaleString()}원</div>
          </div>
          <div style={{background:`${T.red}15`,border:`1px solid ${T.red}30`,borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:T.muted,marginBottom:3}}>손절가</div>
            <div style={{fontSize:17,fontWeight:700,color:T.red}}>{aiResult.stopLoss?.toLocaleString()}원</div>
          </div>
        </div>
        {[["📊 기술 분석",aiResult.reasoning?.technical],["📰 뉴스/시황",aiResult.reasoning?.sentiment],["⚠️ 리스크",aiResult.reasoning?.risk]].map(([l,t])=>(
          <div key={l} style={{background:T.bg,borderRadius:8,padding:"10px 14px",marginBottom:8}}>
            <div style={{fontSize:10,color:T.accent,marginBottom:3}}>{l}</div>
            <div style={{fontSize:12,color:T.text,lineHeight:1.7}}>{t}</div>
          </div>
        ))}
        {aiResult.keyPoints?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:10}}>
          {aiResult.keyPoints.map((p,i)=><span key={i} style={{background:`${acColor}20`,border:`1px solid ${acColor}40`,color:acColor,borderRadius:20,padding:"3px 11px",fontSize:11}}>{p}</span>)}
        </div>}
      </div>}

      {stockInfo&&<div className="fade" style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:20,marginBottom:14}}>
        <div style={{fontSize:11,color:T.muted,marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
          주문 실행 <span style={{background:`${modeColor}20`,border:`1px solid ${modeColor}40`,color:modeColor,borderRadius:20,padding:"1px 8px",fontSize:10}}>{mode==="real"?"실전":"모의"}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <div style={{fontSize:11,color:T.muted,marginBottom:5}}>주문유형</div>
            <div style={{display:"flex",gap:6}}>
              {["시장가","지정가"].map(t=>(
                <button key={t} onClick={()=>{setOrderType(t);if(t==="시장가")setOrderPrice(0);}}
                  style={{flex:1,border:`1px solid ${orderType===t?T.accent:T.border}`,background:orderType===t?`${T.accent}20`:"none",color:orderType===t?T.accent:T.muted,borderRadius:6,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{t}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:T.muted,marginBottom:5}}>수량 (주)</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <button onClick={()=>setOrderQty(q=>Math.max(1,q-1))} style={{background:T.bg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,width:30,height:36,cursor:"pointer",fontSize:16}}>−</button>
              <input type="number" value={orderQty} min="1" onChange={e=>setOrderQty(Math.max(1,parseInt(e.target.value)||1))}
                style={{flex:1,background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:"7px 8px",color:T.text,fontSize:14,fontWeight:700,fontFamily:"inherit",textAlign:"center",outline:"none"}}/>
              <button onClick={()=>setOrderQty(q=>q+1)} style={{background:T.bg,border:`1px solid ${T.border}`,color:T.text,borderRadius:6,width:30,height:36,cursor:"pointer",fontSize:16}}>+</button>
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:T.muted,marginBottom:5}}>지정가 (원)</div>
            <input type="number" value={orderType==="시장가"?0:orderPrice} disabled={orderType==="시장가"} onChange={e=>setOrderPrice(parseInt(e.target.value)||0)}
              style={{width:"100%",background:orderType==="시장가"?T.panel2:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:"7px 10px",color:orderType==="시장가"?T.muted:T.text,fontSize:14,fontFamily:"inherit",outline:"none"}}/>
          </div>
        </div>
        <div style={{background:T.bg,borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:T.sub,display:"flex",gap:16,flexWrap:"wrap"}}>
          <span>종목: <b style={{color:T.text}}>{ticker} {stockInfo.hts_kor_isnm}</b></span>
          <span>수량: <b style={{color:T.text}}>{orderQty}주</b></span>
          <span>유형: <b style={{color:T.text}}>{orderType}</b></span>
          <span>예상: <b style={{color:T.accent}}>{(orderType==="시장가"?parseInt(stockInfo.stck_prpr)*orderQty:orderPrice*orderQty).toLocaleString()}원</b></span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={()=>setConfirmOpen("buy")} disabled={orderBusy} style={{background:`${T.green}20`,border:`1px solid ${T.green}50`,color:T.green,borderRadius:8,padding:"13px 0",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:orderBusy?.5:1}}>📈 매수</button>
          <button onClick={()=>setConfirmOpen("sell")} disabled={orderBusy} style={{background:`${T.red}20`,border:`1px solid ${T.red}50`,color:T.red,borderRadius:8,padding:"13px 0",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:orderBusy?.5:1}}>📉 매도</button>
        </div>
        {orderMsg&&<div style={{marginTop:12,background:orderMsg.ok?`${T.green}15`:`${T.red}15`,border:`1px solid ${orderMsg.ok?T.green:T.red}40`,borderRadius:8,padding:"11px 14px",fontSize:13,color:orderMsg.ok?T.green:T.red}}>{orderMsg.ok?"✅":"❌"} {orderMsg.text}</div>}
      </div>}

      {confirmOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
        <div style={{background:T.panel,border:`2px solid ${confirmOpen==="buy"?T.green:T.red}`,borderRadius:12,padding:28,maxWidth:340,width:"90%"}}>
          <div style={{fontSize:16,fontWeight:700,color:confirmOpen==="buy"?T.green:T.red,marginBottom:12}}>{confirmOpen==="buy"?"📈 매수 확인":"📉 매도 확인"}</div>
          <div style={{fontSize:13,color:T.sub,lineHeight:1.9,marginBottom:18}}>
            <div>종목: <b style={{color:T.text}}>{stockInfo?.hts_kor_isnm} ({ticker})</b></div>
            <div>수량: <b style={{color:T.text}}>{orderQty}주</b></div>
            <div>유형: <b style={{color:T.text}}>{orderType}</b></div>
            {mode==="real"&&<div style={{color:T.red,fontWeight:700,marginTop:8}}>⚠️ 실전 투자 — 실제 자금이 사용됩니다</div>}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setConfirmOpen(null)} style={{flex:1,background:"none",border:`1px solid ${T.border}`,color:T.muted,borderRadius:8,padding:"11px 0",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>취소</button>
            <button onClick={()=>handleOrder(confirmOpen)} style={{flex:1,background:confirmOpen==="buy"?T.green:T.red,color:"#000",border:"none",borderRadius:8,padding:"11px 0",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>확인 주문</button>
          </div>
        </div>
      </div>}

      <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:16}}>
        <div style={{fontSize:11,color:T.muted,marginBottom:10}}>시스템 로그</div>
        <div ref={logRef} style={{height:130,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
          {log.length===0&&<div style={{color:T.muted,fontSize:12}}>분석 실행 시 로그가 표시됩니다.</div>}
          {log.map((l,i)=><div key={i} style={{fontSize:12,color:l.type==="error"?T.red:l.type==="success"?T.green:l.type==="warn"?T.accent:T.sub}}><span style={{color:T.border}}>{l.t}</span>  {l.msg}</div>)}
        </div>
      </div>
      <div style={{textAlign:"center",fontSize:10,color:T.muted,marginTop:16,lineHeight:1.8}}>
        ⚠️ AI 분석 보조 도구입니다. 투자 판단과 책임은 전적으로 사용자에게 있습니다.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
